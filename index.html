<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Informasi QC</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%); 
      color: #334155;
    }
    
    .wrapper {
      position: relative;
      width: 420px;
      padding: 10px;
      background: #ffffff;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06), 0 5px 15px rgba(15, 23, 42, 0.03); 
      border-radius: 20px;
      overflow: hidden;
    }
    
    .form-wrapper {
      display: flex;
      flex-direction: column;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 40px;
    }
    
    h2 {
      font-size: 26px;
      color: #0f172a;
      text-align: center;
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 25px; /* Sedikit dikurangi untuk memberi ruang notifikasi */
      font-weight: 500;
    }
    
    /* --- CSS BARU UNTUK KOTAK NOTIFIKASI --- */
    .alert-box {
      display: none; /* Disembunyikan secara default */
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .alert-error {
      background: #fef2f2;
      color: #ef4444;
      border: 1px solid #fecaca;
    }

    .alert-success {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }
    /* ---------------------------------------- */

    .input-group {
      position: relative;
      margin-bottom: 24px;
    }
    
    .input-group input {
      width: 100%;
      height: 52px;
      font-size: 14px;
      font-weight: 500;
      color: #334155;
      padding: 0 16px;
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .input-group input:focus {
      border-color: #4f46e5;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }
    
    .input-group label {
      position: absolute;
      top: 50%;
      left: 16px;
      transform: translateY(-50%);
      font-size: 14px;
      color: #94a3b8;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 0 4px;
      border-radius: 4px;
    }
    
    .input-group input:focus ~ label,
    .input-group input:valid ~ label {
      top: -2px;
      left: 12px;
      font-size: 12px;
      color: #4f46e5;
      background: #ffffff;
      font-weight: 600;
    }
    
    .remember {
      margin-bottom: 28px;
    }
    
    .remember label {
      font-size: 13px;
      color: #64748b;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      user-select: none;
    }
    
    .remember input {
      accent-color: #4f46e5;
      width: 18px;
      height: 18px;
      cursor: pointer;
      border-radius: 4px;
    }
    
    button {
      width: 100%;
      height: 52px;
      background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      border-radius: 12px;
      border: none;
      outline: none;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.25);
      transition: all 0.3s ease;
    }
    
    button:hover {
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
      transform: translateY(-2px);
    }
    
    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.2);
    }
    
    /* Class tambahan jika ingin tombol nonaktif saat loading */
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
  </style>
</head>
<body>
  
  <div class="wrapper">
    <div class="form-wrapper sign-in">
      <form id="loginForm">
        <h2>Sistem Informasi QC</h2>
        <p class="subtitle">Tracking Web Dashboard</p>

        <!-- Elemen untuk menampilkan notifikasi/warning -->
        <div id="alertBox" class="alert-box"></div>

        <div class="input-group">
          <input type="text" id="username" required autocomplete="off">
          <label for="username">Username</label>
        </div>
        
        <div class="input-group">
          <input type="password" id="password" required autocomplete="off">
          <label for="password">Password</label>
        </div>
        
        <div class="remember">
          <label><input type="checkbox" id="rememberMe"> Ingat saya</label>
        </div>
        
        <button type="submit" id="btnSubmit">Masuk</button>
      </form>
    </div>
  </div>

  <script src="js/login-database.js"></script>

  <script>
    const formLogin = document.getElementById('loginForm');
    const alertBox = document.getElementById('alertBox');
    const btnSubmit = document.getElementById('btnSubmit');

    // Fungsi pembantu untuk menampilkan notifikasi
    function showNotification(message, type) {
        alertBox.style.display = 'block';
        alertBox.textContent = message;
        
        if (type === 'success') {
            alertBox.className = 'alert-box alert-success';
        } else {
            alertBox.className = 'alert-box alert-error';
        }
    }

    formLogin.addEventListener('submit', function(event) {
        event.preventDefault(); 

        // Reset notifikasi setiap kali tombol ditekan
        alertBox.style.display = 'none';

        const inputUser = document.getElementById('username').value.trim();
        const inputPass = document.getElementById('password').value.trim();

        const user = registeredAccounts.find(acc => acc.username === inputUser && acc.password === inputPass);

        if (user) {
            localStorage.setItem("active_user_role", user.role);
            localStorage.setItem("loggedInUser", user.username);
            
            // Tampilkan pesan sukses berwarna hijau
            showNotification("Berhasil masuk! Mengalihkan...", "success");
            
            // Ubah tombol jadi status loading
            btnSubmit.innerHTML = 'Memproses...';
            btnSubmit.disabled = true;

            setTimeout(() => {
                window.location.href = 'dashboard.html'; 
            }, 1200); // Jeda sedikit lebih lama agar pesan sukses sempat terbaca

        } else {
            // Tampilkan pesan error berwarna merah
            showNotification("Akses ditolak! Username atau password salah.", "error");
            
            // Kosongkan kolom password agar user bisa ketik ulang
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }
    });
  </script>
</body>
</html>
